[mcp]
host = "0.0.0.0"
port = 8080

[http]
host = "0.0.0.0"
port = 8081

[rate_limit]
ip_limit = 60
key_limit = 1000
window_sec = 60

[auth]
apikeys = [
  "sk-your-key-here",
  "sk-your-key-here-2"
]

[jwt]
secret = "your-jwt-secret-change-in-production"
issuer = "stock-gateway"
expiration_hours = 24

[database]
host = "your-mysql-host"
port = 3306
user = "your-db-user"
password = "your-db-password"
database = "your-db-name"
